name: claude-session-manager

services:
  app:
    container_name: csm-app
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1001}
      dockerfile_inline: |
        FROM php:8.3-cli-alpine
        # No tmux client needed here - the container never touches tmux or
        # the host process table directly. See host-agent/ and README.md.
        ARG APP_UID=1000
        ARG APP_GID=1001
        RUN addgroup -g "${APP_GID}" appgroup \
            && adduser -D -H -u "${APP_UID}" -G appgroup appuser
        WORKDIR /var/www/html
        USER appuser
        ENV HOME=/tmp
        EXPOSE 80
        CMD ["php", "-S", "0.0.0.0:80", "-t", "/var/www/html"]
    restart: unless-stopped
    environment:
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_PASS: ${BASIC_AUTH_PASS}
      CSM_AGENT_SOCKET: /run/csm-agent.sock
    volumes:
      # Code is mounted, not copied into the image, so edits show up on the
      # next request with no rebuild/restart needed.
      - ./src:/var/www/html
      # The ONLY thing the container can reach on the host: a UNIX socket
      # served by the host-native agent (see host-agent/). That agent must
      # already be installed and running (host-agent/install.sh) BEFORE
      # this container starts, or Docker will bind-mount an empty
      # directory instead of the real socket file. See README.md.
      - ${CSM_AGENT_SOCKET_HOST:-/run/user/1000/csm-agent.sock}:/run/csm-agent.sock
    ports:
      # Bind explicitly to a LAN interface IP, never 0.0.0.0. See README.
      - "${BIND_ADDR:-127.0.0.1}:${APP_PORT:-8091}:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.csm.rule=Host(`csm.dev.local.test`)"
      - "traefik.http.routers.csm.entrypoints=web"
      - "traefik.http.services.csm.loadbalancer.server.port=80"
    networks:
      - web

networks:
  web:
    external: true
